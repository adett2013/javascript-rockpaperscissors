<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>
</head>
<style>
    body {
        color: white;
        background-color: rgb(29, 30, 32);
        font-family: -apple-system,BlinkMacSystemFont,segoe ui,Roboto,Oxygen,Ubuntu,Cantarell,open sans,helvetica neue,sans-serif;
        text-align: center;
        margin-top: 50px;
        padding-bottom: 120px;
    }
    p {
        font-size: 18px;
        color: rgb(155, 156, 157);
    }
    button {
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
        color: rgb(255, 255, 255);
        background-color: rgb(27, 114, 155);
        border: none;
    }
    button:hover {
        background-color: rgb(27, 114, 155, 0.8);
    }
    button:disabled {
        background-color: rgba(88, 89, 90, 0.76);
        cursor: not-allowed;
    }
    #game-result {
        margin-top: 20px;
        font-size: 18px;
    }
    a {
        color: rgb(155, 156, 157);
        text-decoration: none;
        position: relative;
        display: inline-block;
    }
    a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -2px;
        width: 100%;
        height: 2px;
        background-color: rgb(155, 156, 157);
        transform: scaleX(0);
        transform-origin: center;
        transition: transform 220ms ease;
    }
    a:hover::after,
    a:focus-visible::after {
        transform: scaleX(1);
    }
    .credits {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        box-sizing: border-box;
        padding: 12px 16px;
        background-color: rgba(29, 30, 32, 0.95);
        border-top: 1px solid rgb(65, 66, 68);
        backdrop-filter: blur(4px);
    }
    .credits p {
        margin: 0 0 6px;
    }
</style>
<body>
    <h1>Rock, Paper, Scissors</h1>
    <p>Take a turn to start!</p>
    <p style="display: none;" id="scoreboard">Score - You: <span id="user-score">0</span> | Computer: <span id="computer-score">0</span></p>
    <button id="rock">Rock</button>
    <button id="paper">Paper</button>
    <button id="scissors">Scissors</button>
    <div id="game-result">
        <p id="result"></p>
    </div>
    <div class="credits">
        <p>Created by Arne Dettmer with HTML5, CSS3 and JavaScript</p>
        <a href="https://arne-dettmer.de">Portfolio</a>
        <br>
        <a href="https://net.arne-dettmer.de/impressum">Impressum</a>
    </div>
    <script src="./script.js"></script>
</body>
</html>
